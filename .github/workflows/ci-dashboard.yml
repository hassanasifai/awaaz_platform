name: ci-dashboard

on:
  push:
    branches: [main]
    paths: ["apps/dashboard/**", ".github/workflows/ci-dashboard.yml"]
  pull_request:
    paths: ["apps/dashboard/**", ".github/workflows/ci-dashboard.yml"]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install
        working-directory: apps/dashboard
        run: npm ci

      - name: Typecheck
        working-directory: apps/dashboard
        run: npm run typecheck

      - name: Lint
        working-directory: apps/dashboard
        run: npm run lint

      - name: Unit tests
        working-directory: apps/dashboard
        run: npm test --silent

      - name: Build
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          BETTER_AUTH_SECRET: ci-fake-secret-32-bytes-padding-xx
          BETTER_AUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://awaaz:testpass@localhost:5432/awaaz_test
        run: npm run build
