name: ci-api

on:
  push:
    branches: [main]
    paths: ["apps/api/**", ".github/workflows/ci-api.yml"]
  pull_request:
    paths: ["apps/api/**", ".github/workflows/ci-api.yml"]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: awaaz_test
          POSTGRES_USER: awaaz
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U awaaz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://awaaz:testpass@localhost:5432/awaaz_test
      DATABASE_URL_SYNC: postgresql+psycopg://awaaz:testpass@localhost:5432/awaaz_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      PII_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      PHONE_HASH_KEY: fedcba9876543210fedcba9876543210
      WEBHOOK_HMAC_DEFAULT_KEY: deadbeefdeadbeefdeadbeefdeadbeef
      BETTER_AUTH_SECRET: testsecrettestsecrettestsecret32
      ANTHROPIC_API_KEY: test
      META_WA_ACCESS_TOKEN: test
      META_WA_PHONE_NUMBER_ID: "1"
      META_WA_BUSINESS_ACCOUNT_ID: "1"
      META_WA_APP_SECRET: testsecret
      META_WA_VERIFY_TOKEN: testverify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: apps/api
        run: ruff check .

      - name: Black
        working-directory: apps/api
        run: black --check .

      - name: mypy strict
        working-directory: apps/api
        run: mypy awaaz_api

      - name: Apply migrations
        working-directory: apps/api
        run: alembic upgrade head

      - name: pytest
        working-directory: apps/api
        run: pytest -q --cov=awaaz_api --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          flags: api
        if: always()
