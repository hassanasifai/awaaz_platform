global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: awaaz

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: awaaz-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: awaaz-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8000"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis:9121"]
