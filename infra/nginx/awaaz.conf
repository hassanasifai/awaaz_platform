# Reference reverse-proxy config.  Caddy is recommended for prod (auto-TLS).
# This file is a guide; copy + adapt to your TLS termination platform.

upstream awaaz_api {
    server api:8000;
    keepalive 64;
}

upstream awaaz_dashboard {
    server dashboard:3000;
    keepalive 32;
}

# API
server {
    listen 443 ssl http2;
    server_name api.awaaz.pk;

    ssl_certificate     /etc/ssl/awaaz/fullchain.pem;
    ssl_certificate_key /etc/ssl/awaaz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;          # CSV upload tolerance
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_buffering off;

    location /v1/webhooks/ {
        # Webhooks: do NOT buffer, do NOT rewrite the body — signatures depend on it.
        proxy_pass http://awaaz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://awaaz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Dashboard
server {
    listen 443 ssl http2;
    server_name app.awaaz.pk;

    ssl_certificate     /etc/ssl/awaaz/fullchain.pem;
    ssl_certificate_key /etc/ssl/awaaz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;     # Shopify embedded admin needs this
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.shopify.com https://js.stripe.com; connect-src 'self' https://api.awaaz.pk https://api.stripe.com; frame-ancestors https://admin.shopify.com https://*.myshopify.com;" always;

    location /_next/static/ {
        proxy_pass http://awaaz_dashboard;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://awaaz_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name api.awaaz.pk app.awaaz.pk;
    return 301 https://$host$request_uri;
}
